<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    margin: 0;
    padding: 16px;
    color: #333;
  }
  h2 {
    margin: 0 0 8px 0;
    font-size: 14px;
    font-weight: 600;
  }
  .subtitle {
    font-size: 11px;
    color: #666;
    margin-bottom: 14px;
  }
  label {
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    color: #555;
  }
  select, textarea {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
  }
  textarea {
    min-height: 80px;
    resize: vertical;
  }
  select:focus, textarea:focus {
    outline: none;
    border-color: #0d99ff;
  }
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .btn-group button {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 11px;
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-group button:hover {
    border-color: #0d99ff;
    background: #f5f9ff;
  }
  .btn-group button.selected {
    background: #0d99ff;
    border-color: #0d99ff;
    color: white;
  }
  .buttons {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  button#add {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    background: #0d99ff;
    color: white;
    cursor: pointer;
  }
  button#add:hover { background: #0b85e0; }
  button#cancel {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    background: #f0f0f0;
    color: #333;
    cursor: pointer;
  }
  button#cancel:hover { background: #e0e0e0; }
  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .checkbox-wrap input { margin: 0; }

  .screen { display: none; }
  .screen.active { display: block; }

  .mode-screen {
    text-align: center;
    padding: 8px 0;
  }
  .mode-screen h2 {
    margin-bottom: 20px;
    font-size: 13px;
    color: #666;
    font-weight: 500;
  }
  .mode-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .mode-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }
  .mode-btn:hover {
    border-color: #0d99ff;
    background: #f5f9ff;
  }
  .mode-btn .icon {
    font-size: 28px;
    line-height: 1;
  }
  .btn-back {
    margin-top: 12px;
    padding: 6px 10px;
    font-size: 11px;
    color: #666;
    background: transparent;
    border: none;
    cursor: pointer;
  }
  .btn-back:hover { color: #0d99ff; }
</style>

<div id="screenMode" class="screen active">
  <div class="mode-screen">
    <h2>¿Qué tipo de commit quieres hacer?</h2>
    <div class="mode-options">
      <button type="button" class="mode-btn" id="btnFileCommit">
        <span class="icon" aria-hidden="true">&#128196;</span>
        <span>File commit</span>
      </button>
      <button type="button" class="mode-btn" id="btnUxUiCommit">
        <span class="icon" aria-hidden="true">&#128396;</span>
        <span>UX/UI commit</span>
      </button>
    </div>
  </div>
</div>

<div id="screenFileCommit" class="screen">
  <button type="button" class="btn-back" id="backFromFile">← Volver</button>
  <h2>Documentar cambios</h2>
  <p class="subtitle">Elige la pagina, el tipo de version y describe que cambiaste.</p>

  <label>Pagina donde anadir el changelog</label>
  <select id="pageSelect"></select>

<label>Tipo de version</label>
<div class="btn-group" id="versionType">
  <button type="button" data-version="patch">Patch v0.1.1</button>
  <button type="button" data-version="minor">Minor v0.2.0</button>
  <button type="button" data-version="major">Major v1.0.0</button>
</div>

<label>Tipo de comentario</label>
<div class="btn-group" id="commentType">
  <button type="button" data-type="added">&#128640; Añadido</button>
  <button type="button" data-type="deleted">&#128128; Borrado</button>
  <button type="button" data-type="changed">&#128736; Cambio</button>
  <button type="button" data-type="fixed">&#128138; Fixed</button>
  <button type="button" data-type="custom">Custom</button>
</div>

<label for="change">Cambios realizados</label>
<textarea id="change" placeholder="Ej: Actualice el boton primario, corregi espaciados en el header..."></textarea>

<div class="buttons">
  <button id="add">Anadir al changelog</button>
  <div class="checkbox-wrap">
    <input type="checkbox" id="saveVersion" checked>
    <label for="saveVersion" style="margin:0;font-weight:400">Subir al historial de versiones</label>
  </div>
</div>

  <button id="cancel">Cerrar</button>
</div>

<div id="screenUxUiCommit" class="screen">
  <button type="button" class="btn-back" id="backFromUxUi">← Volver</button>
  <h2>UX/UI commit</h2>
  <p class="subtitle">Documenta cambios de diseño sin versionado ni historial de Figma. Elige una página existente o crea una nueva.</p>

  <label>Página donde añadir el commit</label>
  <select id="pageSelectUx">
    <option value="new">— Crear página nueva —</option>
  </select>

  <label>Tipo de comentario</label>
  <div class="btn-group" id="commentTypeUx">
    <button type="button" data-type="added">&#128640; Añadido</button>
    <button type="button" data-type="deleted">&#128128; Borrado</button>
    <button type="button" data-type="changed">&#128736; Cambio</button>
    <button type="button" data-type="fixed">&#128138; Fixed</button>
    <button type="button" data-type="custom">Custom</button>
  </div>

  <label for="changeUx">Cambios realizados</label>
  <textarea id="changeUx" placeholder="Ej: Actualicé el botón primario, corregí espaciados en el header..."></textarea>

  <div class="buttons">
    <button id="addUx">Añadir al changelog</button>
  </div>

  <button id="cancelUx">Cerrar</button>
</div>

<script>
  var screenMode = document.getElementById('screenMode');
  var screenFileCommit = document.getElementById('screenFileCommit');
  var screenUxUiCommit = document.getElementById('screenUxUiCommit');

  function showScreen(screen) {
    screenMode.classList.remove('active');
    screenFileCommit.classList.remove('active');
    screenUxUiCommit.classList.remove('active');
    if (screen) screen.classList.add('active');
  }

  document.getElementById('btnFileCommit').onclick = function () {
    showScreen(screenFileCommit);
  };
  document.getElementById('btnUxUiCommit').onclick = function () {
    showScreen(screenUxUiCommit);
  };
  document.getElementById('backFromFile').onclick = function () {
    showScreen(screenMode);
  };
  document.getElementById('backFromUxUi').onclick = function () {
    showScreen(screenMode);
  };

  var pageSelect = document.getElementById('pageSelect');
  var versionTypeEl = document.getElementById('versionType');
  var commentTypeEl = document.getElementById('commentType');
  var textarea = document.getElementById('change');
  var saveVersionCheck = document.getElementById('saveVersion');

  var selectedVersion = 'patch';
  var selectedComment = null;

  versionTypeEl.onclick = function (e) {
    var btn = e.target.closest('button[data-version]');
    if (!btn) return;
    versionTypeEl.querySelectorAll('button').forEach(function (b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedVersion = btn.dataset.version;
  };

  commentTypeEl.onclick = function (e) {
    var btn = e.target.closest('button[data-type]');
    if (!btn) return;
    commentTypeEl.querySelectorAll('button').forEach(function (b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedComment = btn.dataset.type;
  };

  var pageSelectUx = document.getElementById('pageSelectUx');
  var commentTypeUx = document.getElementById('commentTypeUx');
  var textareaUx = document.getElementById('changeUx');
  var selectedCommentUx = null;

  function fillPageSelect(selectEl, msg) {
    selectEl.innerHTML = '';
    (msg.pages || []).forEach(function (p) {
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      if (msg.changelogPageId && p.id === msg.changelogPageId) opt.selected = true;
      else if (!msg.changelogPageId && p.isCurrent) opt.selected = true;
      selectEl.appendChild(opt);
    });
  }

  function fillPageSelectUx(msg) {
    pageSelectUx.innerHTML = '';
    var optNew = document.createElement('option');
    optNew.value = 'new';
    optNew.textContent = '— Crear página nueva —';
    pageSelectUx.appendChild(optNew);
    (msg.pages || []).forEach(function (p) {
      if (p.id === msg.changelogPageId) return;
      var opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      pageSelectUx.appendChild(opt);
    });
  }

  commentTypeUx.onclick = function (e) {
    var btn = e.target.closest('button[data-type]');
    if (!btn) return;
    commentTypeUx.querySelectorAll('button').forEach(function (b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedCommentUx = btn.dataset.type;
  };

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'init') {
      fillPageSelect(pageSelect, msg);
      fillPageSelectUx(msg);
    }
  };

  document.getElementById('add').onclick = function () {
    var text = textarea.value.trim();
    if (!text) return;
    if (selectedComment === null) {
      alert('Selecciona un tipo de comentario.');
      return;
    }
    parent.postMessage({
      pluginMessage: {
        type: 'add-entry',
        flow: 'file',
        pageId: pageSelect.value,
        versionType: selectedVersion,
        commentType: selectedComment,
        text: text,
        saveToVersionHistory: saveVersionCheck.checked
      }
    }, '*');
    textarea.value = '';
  };

  document.getElementById('addUx').onclick = function () {
    var text = textareaUx.value.trim();
    if (!text) return;
    if (selectedCommentUx === null) {
      alert('Selecciona un tipo de comentario.');
      return;
    }
    parent.postMessage({
      pluginMessage: {
        type: 'add-entry',
        flow: 'uxui',
        uxuiPageId: pageSelectUx.value || 'new',
        commentType: selectedCommentUx,
        text: text,
        saveToVersionHistory: false
      }
    }, '*');
    textareaUx.value = '';
  };

  document.getElementById('cancel').onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  };
  document.getElementById('cancelUx').onclick = function () {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  };
</script>
